name: 'container opendisplay-wifi'

on:
  push:
    branches:
      - main
    paths:
      - 'opendisplay-wifi/config.yaml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$before:opendisplay-wifi/config.yaml" 2>/dev/null; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version="$(
            git show "$before:opendisplay-wifi/config.yaml" |
              awk -F': *' '/^version:/ { gsub(/"/, "", $2); print $2; exit }'
          )"
          current_version="$(
            awk -F': *' '/^version:/ { gsub(/"/, "", $2); print $2; exit }' opendisplay-wifi/config.yaml
          )"

          if [[ -n "$previous_version" && "$previous_version" != "$current_version" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opendisplay-wifi
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./opendisplay-wifi/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
