<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDisplay Wi-Fi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ha-blue: #03a9f4;
      --ha-blue-dark: #0288d1;
      --ha-blue-light: #4fc3f7;
    }
    body {
      background: linear-gradient(135deg, #03a9f4 0%, #0288d1 100%);
      min-height: 100vh;
    }
    .colour-scheme {
      display: inline-block; padding: 2px 8px; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
      background: #e0f2fe; color: #0369a1;
    }
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; justify-content: center; align-items: center;
    }
    #modal-overlay.open { display: flex; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="p-4">
  <div class="container mx-auto max-w-3xl">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-white">OpenDisplay Wi-Fi</h1>
        <p class="text-blue-100 text-sm mt-1">
          Manage your <a href="https://opendisplay.org" target="_blank" class="underline text-white hover:text-blue-200">OpenDisplay</a> e-paper screens
        </p>
      </div>
      <button onclick="loadScreens()" class="px-3 py-2 bg-white/20 hover:bg-white/30 text-white rounded-lg text-sm transition duration-200">
        Refresh
      </button>
    </div>

    <!-- Connected Screens -->
    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4" style="color: var(--ha-blue-dark)">Connected Screens</h2>
      <div id="no-screens" class="text-gray-400 italic py-4">Waiting for screens to connect...</div>
      <div id="screens-list" class="divide-y divide-gray-100"></div>
    </div>

    <!-- Upload Image -->
    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4" style="color: var(--ha-blue-dark)">Upload Image</h2>
      <form id="upload-form" class="space-y-3">
        <div>
          <label for="upload-file" class="block text-sm font-medium text-gray-700 mb-1">Select an image file</label>
          <input type="file" id="upload-file" name="image" accept="image/*"
            class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:border-transparent text-sm"
            style="border-color: var(--ha-blue-light)">
        </div>
        <button type="submit"
          class="px-4 py-2 rounded-md text-white text-sm font-medium transition duration-200"
          style="background: var(--ha-blue)" onmouseover="this.style.background='var(--ha-blue-dark)'" onmouseout="this.style.background='var(--ha-blue)'">
          Upload
        </button>
      </form>
      <div id="uploaded-files" class="mt-4"></div>
    </div>

    <!-- Attribution -->
    <div class="text-center text-blue-100 text-xs py-4">
      Powered by <a href="https://opendisplay.org" target="_blank" class="underline text-white">OpenDisplay</a>
      &middot;
      <a href="https://github.com/balloob/py-opendisplay/tree/wifi-server" target="_blank" class="underline text-white">py-opendisplay</a>
    </div>
  </div>

  <!-- Assign Modal -->
  <div id="modal-overlay">
    <div id="modal" class="bg-white rounded-xl shadow-2xl p-6 w-[90%] max-w-md">
      <h2 class="text-lg font-semibold mb-4" style="color: var(--ha-blue-dark)">
        Assign Image to <span id="modal-screen-name"></span>
      </h2>

      <div class="flex mb-4 rounded-lg overflow-hidden border" style="border-color: var(--ha-blue-light)">
        <button class="tab flex-1 py-2 text-sm font-medium transition duration-200 text-white"
          data-tab="url" onclick="switchTab('url')" style="background: var(--ha-blue)">URL</button>
        <button class="tab flex-1 py-2 text-sm font-medium transition duration-200 text-gray-600 bg-gray-50"
          data-tab="file" onclick="switchTab('file')">Uploaded File</button>
      </div>

      <div class="tab-content active" id="tab-url">
        <div class="mb-3">
          <label for="assign-url" class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
          <input type="text" id="assign-url" placeholder="https://example.com/image.png"
            class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:border-transparent text-sm"
            style="border-color: var(--ha-blue-light)">
        </div>
        <div class="mb-3" id="poll-interval-group">
          <label for="assign-poll" class="block text-sm font-medium text-gray-700 mb-1">Update interval (seconds)</label>
          <input type="number" id="assign-poll" value="300" min="10"
            class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:border-transparent text-sm"
            style="border-color: var(--ha-blue-light)">
        </div>
      </div>

      <div class="tab-content" id="tab-file">
        <div class="mb-3">
          <label for="assign-file" class="block text-sm font-medium text-gray-700 mb-1">Select uploaded file</label>
          <select id="assign-file"
            class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:border-transparent text-sm"
            style="border-color: var(--ha-blue-light)"></select>
        </div>
      </div>

      <div class="flex gap-2 justify-end mt-4">
        <button onclick="closeModal()"
          class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition duration-200">
          Cancel
        </button>
        <button onclick="submitAssignment()"
          class="px-4 py-2 rounded-md text-sm font-medium text-white transition duration-200"
          style="background: var(--ha-blue)" onmouseover="this.style.background='var(--ha-blue-dark)'" onmouseout="this.style.background='var(--ha-blue)'">
          Assign
        </button>
      </div>
    </div>
  </div>

  <script>
    const BASE = "{{INGRESS_PATH}}";
    let currentScreenId = null;
    let currentTab = "url";

    async function loadScreens() {
      try {
        const res = await fetch(`${BASE}/api/screens`);
        const screens = await res.json();
        const list = document.getElementById("screens-list");
        const empty = document.getElementById("no-screens");

        if (screens.length === 0) {
          empty.style.display = "block";
          list.innerHTML = "";
          return;
        }

        empty.style.display = "none";
        list.innerHTML = screens.map(s => {
          const cs = colourSchemeName(s.colour_scheme);
          const seenAgo = s.last_seen_seconds_ago < 60
            ? `${s.last_seen_seconds_ago}s ago`
            : `${Math.floor(s.last_seen_seconds_ago / 60)}m ago`;
          let assignHtml = "";
          if (s.assignment) {
            const src = s.assignment.source;
            const display = src.length > 50 ? src.substring(0, 50) + "..." : src;
            const interval = s.assignment.type === "url"
              ? ` (every ${s.assignment.poll_interval}s)`
              : "";
            assignHtml = `<div class="text-sm mt-1" style="color: var(--ha-blue)">Showing: ${escHtml(display)}${interval}</div>`;
          }
          return `
            <div class="flex items-start justify-between py-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="font-semibold text-gray-800">${s.width} x ${s.height}</span>
                  <span class="colour-scheme">${cs}</span>
                </div>
                <div class="text-xs text-gray-400 mt-1">
                  FW ${s.firmware_id}.${s.firmware_version} &middot; Last seen ${seenAgo}
                </div>
                ${assignHtml}
              </div>
              <div class="flex gap-2 ml-3 flex-shrink-0">
                <button onclick="openAssign('${s.id}', '${s.width}x${s.height}')"
                  class="px-3 py-1.5 rounded-md text-white text-sm font-medium transition duration-200"
                  style="background: var(--ha-blue)" onmouseover="this.style.background='var(--ha-blue-dark)'" onmouseout="this.style.background='var(--ha-blue)'">
                  Assign Image
                </button>
                ${s.assignment ? `
                  <button onclick="unassign('${s.id}')"
                    class="px-3 py-1.5 rounded-md text-white text-sm font-medium bg-red-500 hover:bg-red-600 transition duration-200">
                    Clear
                  </button>` : ""}
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        console.error("Failed to load screens:", e);
      }
    }

    function colourSchemeName(cs) {
      const names = { 0: "B/W", 1: "B/W/R", 2: "B/W/Y", 3: "4-Gray", 4: "7-Color" };
      return names[cs] || `scheme ${cs}`;
    }

    function escHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach(t => {
        const isActive = t.dataset.tab === tab;
        t.style.background = isActive ? "var(--ha-blue)" : "#f9fafb";
        t.className = `tab flex-1 py-2 text-sm font-medium transition duration-200 ${isActive ? "text-white" : "text-gray-600 bg-gray-50"}`;
      });
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      document.getElementById(`tab-${tab}`).classList.add("active");
    }

    function openAssign(screenId, label) {
      currentScreenId = screenId;
      document.getElementById("modal-screen-name").textContent = label;
      document.getElementById("modal-overlay").classList.add("open");
      loadUploads();
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
      currentScreenId = null;
    }

    async function submitAssignment() {
      let source, pollInterval;

      if (currentTab === "url") {
        source = document.getElementById("assign-url").value.trim();
        pollInterval = parseInt(document.getElementById("assign-poll").value) || 300;
      } else {
        const sel = document.getElementById("assign-file");
        source = sel.value;
        pollInterval = 5;
      }

      if (!source) { alert("Please provide an image source."); return; }

      try {
        await fetch(`${BASE}/api/assign`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            screen_id: currentScreenId,
            source: source,
            poll_interval: pollInterval,
          }),
        });
        closeModal();
        loadScreens();
      } catch (e) {
        alert("Failed to assign image: " + e.message);
      }
    }

    async function unassign(screenId) {
      try {
        await fetch(`${BASE}/api/unassign`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ screen_id: screenId }),
        });
        loadScreens();
      } catch (e) {
        alert("Failed to clear assignment: " + e.message);
      }
    }

    // Upload form
    document.getElementById("upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById("upload-file");
      if (!fileInput.files.length) { alert("Select a file first."); return; }

      const form = new FormData();
      form.append("image", fileInput.files[0]);

      try {
        const res = await fetch(`${BASE}/api/upload`, { method: "POST", body: form });
        const data = await res.json();
        if (data.ok) {
          fileInput.value = "";
          loadUploads();
        } else {
          alert("Upload failed: " + (data.error || "unknown error"));
        }
      } catch (e) {
        alert("Upload failed: " + e.message);
      }
    });

    async function loadUploads() {
      try {
        const res = await fetch(`${BASE}/api/uploads`);
        const files = await res.json();
        // Update the file selector in modal
        const sel = document.getElementById("assign-file");
        sel.innerHTML = files.length === 0
          ? '<option value="">No files uploaded yet</option>'
          : files.map(f => `<option value="${escHtml(f.path)}">${escHtml(f.name)}</option>`).join("");

        // Update the uploaded files list
        const container = document.getElementById("uploaded-files");
        if (files.length === 0) {
          container.innerHTML = "";
        } else {
          container.innerHTML = `<p class="text-sm font-medium text-gray-500 mb-2">Uploaded files</p>`
            + `<div class="divide-y divide-gray-100">`
            + files.map(f => `<div class="py-2 text-sm text-gray-700">${escHtml(f.name)}</div>`).join("")
            + `</div>`;
        }
      } catch (e) {
        console.error("Failed to load uploads:", e);
      }
    }

    // Auto-refresh
    loadScreens();
    loadUploads();
    setInterval(loadScreens, 10000);
  </script>
</body>
</html>
